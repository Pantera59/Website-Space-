<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Tourism | Crew</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Barlow&family=Bellefair&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
</head>
<body class="page-crew">

  <header class="primary-header">
    <div class="logo">
      <a href="index.html">
        <img src="shared/logo.svg" alt="Space Tourism logo" />
      </a>
    </div>
    <button class="mobile-nav-toggle" aria-controls="primary-navigation" aria-expanded="false">
      <img src="shared/icon-hamburger.svg" alt="open menu" class="icon-hamburger" />
      <img src="shared/icon-close.svg" alt="close menu" class="icon-close" />
      <span class="sr-only">Menu</span>
    </button>
    <nav>
      <ul id="primary-navigation" class="primary-navigation" data-visible="false">
        <li><a href="index.html"><span aria-hidden="true">00</span> Home</a></li>
        <li><a href="destination-moon.html"><span aria-hidden="true">01</span> Destination</a></li>
        <li class="active"><a href="crew.html" aria-current="page"><span aria-hidden="true">02</span> Crew</a></li>
        <li><a href="technology-vehicle.html"><span aria-hidden="true">03</span> Technology</a></li>
      </ul>
    </nav>
  </header>

  <main class="grid-container grid-container--crew">

    <h1 class="numbered-title">
      <span aria-hidden="true">02</span> Meet your crew
    </h1>

    <picture>
      <source srcset="assets/crew/image-douglas-hurley.webp" type="image/webp" />
      <img src="assets/crew/image-douglas-hurley.png" alt="Douglas Hurley" id="crew-image" />
    </picture>

    <ul class="dot-indicators" role="tablist" aria-label="crew members">
      <li role="presentation">
        <button role="tab" aria-selected="true" data-index="0">
          <span class="sr-only">Douglas Hurley</span>
        </button>
      </li>
      <li role="presentation">
        <button role="tab" aria-selected="false" data-index="1">
          <span class="sr-only">Mark Shuttleworth</span>
        </button>
      </li>
      <li role="presentation">
        <button role="tab" aria-selected="false" data-index="2">
          <span class="sr-only">Victor Glover</span>
        </button>
      </li>
      <li role="presentation">
        <button role="tab" aria-selected="false" data-index="3">
          <span class="sr-only">Anousheh Ansari</span>
        </button>
      </li>
    </ul>

    <article class="crew-details">
      <h2 id="crew-role" class="fs-600 ff-serif uppercase text-accent">Commander</h2>
      <p id="crew-name" class="fs-700 ff-serif uppercase">Douglas Hurley</p>
      <p id="crew-bio" class="text-accent ff-sans-normal">
        Douglas Gerald Hurley is an American engineer, former Marine Corps pilot 
        and former NASA astronaut. He launched into space for the third time as 
        commander of Crew Dragon Demo-2.
      </p>
    </article>

  </main>

  <script src="navigation.js"></script>
  <script src="tabs.js"></script>
</body>
</html>
